syntax = "proto3";

package pb;

option go_package = "distributed-transactions/pb";

service TransactionCoordinator {
  rpc SubmitOrder(SubmitOrderRequest) returns (SubmitOrderResponse);
  rpc GetOrderStatus(OrderStatusRequest) returns (OrderStatusResponse);
}

service TransactionParticipant {
  rpc Prepare(PrepareRequest) returns (PrepareResponse);
  rpc Commit(CommitRequest) returns (CommitResponse);
  rpc Abort(AbortRequest) returns (AbortResponse);
  rpc GetStatus(StatusRequest) returns (StatusResponse);
}

message SubmitOrderRequest {
  string user_id = 1;
  string item_id = 2;
  int32 quantity = 3;
  double amount = 4;
  string idempotency_key = 5;
}

message SubmitOrderResponse {
  string transaction_id = 1;
  string status = 2;  // COMMITTED, ABORTED, PENDING
}

message OrderStatusRequest {
  string transaction_id = 1;
}

message OrderStatusResponse {
  string transaction_id = 1;
  string status = 2;
}

message PrepareRequest {
  string transaction_id = 1;
  oneof payload {
    InventoryPayload inventory = 2;
    PaymentPayload payment = 3;
  }
}

message PrepareResponse {
  string transaction_id = 1;
  bool vote_yes = 2;
  string reason = 3;
}

message InventoryPayload {
  string item_id = 1;
  int32 quantity = 2;
}

message PaymentPayload {
  string user_id = 1;
  double amount = 2;
}

message CommitRequest {
  string transaction_id = 1;
}

message CommitResponse {
  string transaction_id = 1;
  bool success = 2;
}

message AbortRequest {
  string transaction_id = 1;
}

message AbortResponse {
  string transaction_id = 1;
  bool success = 2;
}

message StatusRequest {
  string transaction_id = 1;
}

message StatusResponse {
  string transaction_id = 1;
  string state = 2;
}
